function computeFocuses(){
  const priorities=[];
  let context='';

  // ROUND-BASED METRICS (last 5 rounds)
  const recentRounds=state.rounds.slice(0,5);
  if(recentRounds.length){
    let totalHoles=0,totalPar=0,totalScore=0;
    let totalPen=0,totalPutts=0,trouble=0,fwHits=0,fwAttempts=0;
    let girHits=0,girAttempts=0;
    let appIn15=0,appOnGreen=0,appOffGreen=0,appAttempts=0;
    let udAttempts=0,udMade=0,threePutts=0;

    recentRounds.forEach(r=>{
      r.holes.forEach(h=>{
        totalHoles++;
        totalPar+=h.par||4;
        totalScore+=h.score||0;
        totalPen+=h.penalties||0;
        totalPutts+=h.putts||0;
        // Tee stats only count par-4/5 holes
        if(h.par!==3&&h.tee){
          fwAttempts++;
          if(h.tee==='fairway')fwHits++;
          if(h.tee==='trouble')trouble++;
        }
        // Approach stats — use bucket field if present, fallback to GIR
        if(h.approach){
          appAttempts++;
          if(h.approach==='in15')appIn15++;
          else if(h.approach==='on-green')appOnGreen++;
          else if(h.approach==='off-green')appOffGreen++;
        }
        if(h.gir===true){girHits++;girAttempts++;}
        else if(h.gir===false){girAttempts++;}
        if(h.udOpportunity===true){
          udAttempts++;
          if(h.udResult==='converted'||h.udResult==='holed')udMade++;
        }
        if((h.putts||0)>=3)threePutts++;
      });
    });

    const troubleRate=fwAttempts?(trouble/fwAttempts*100):0;
    const fwPct=fwAttempts?(fwHits/fwAttempts*100):0;
    const udPct=udAttempts?(udMade/udAttempts*100):null;
    const threePuttRate=totalHoles?(threePutts/totalHoles*100):0;
    const penPerRound=recentRounds.length?(totalPen/recentRounds.length):0;
    // Approach quality score: in15=100%, on-green=60%, off-green=0% (excluded from numerator)
    const appQuality=appAttempts?((appIn15*100+appOnGreen*60)/appAttempts):null;
    const inGreenRate=appAttempts?((appIn15+appOnGreen)/appAttempts*100):null;
    const toPar=totalScore-totalPar;

    context=`
      <div style="font-size:10px;line-height:2;color:var(--text-dim)">
        Last ${recentRounds.length} round${recentRounds.length===1?'':'s'} · ${totalHoles} holes
        ${totalScore?` · <strong style="color:var(--text)">${toPar>0?'+'+toPar:toPar===0?'E':toPar} to par</strong>`:''}
        <br>FW+ (par 4/5): <strong style="color:var(--text)">${fwPct.toFixed(0)}%</strong>
        · Trouble: <strong style="color:var(--text)">${troubleRate.toFixed(0)}%</strong>
        · Greens hit: <strong style="color:var(--text)">${inGreenRate!==null?inGreenRate.toFixed(0)+'%':'--'}</strong>
        · 3-Putts: <strong style="color:var(--text)">${threePuttRate.toFixed(0)}%</strong>
        ${udPct!==null?` · U&D: <strong style="color:var(--text)">${udPct.toFixed(0)}%</strong>`:''}
        · Pen/round: <strong style="color:var(--text)">${penPerRound.toFixed(1)}</strong>
      </div>`;

    // Build priority candidates
    if(troubleRate>=20)priorities.push({
      level:troubleRate>=30?1:2,
      score:troubleRate*1.5,
      area:'TEE SHOT — TROUBLE OFF TEE',
      metric:`<strong>${troubleRate.toFixed(0)}%</strong> of par-4/5 tee shots in trouble (${trouble}/${fwAttempts}). Each trouble tee shot averages 1.5+ stroke penalty.`,
      recommendation:'Add 3x FAIRWAY FINDER per week. Trouble rate above 20% is your single biggest stroke-bleeder.'
    });
    if(udPct!==null&&udPct<40)priorities.push({
      level:udPct<25?1:2,
      score:(50-udPct)*1.4,
      area:'SHORT GAME — UP & DOWN CONVERSION',
      metric:`<strong>${udPct.toFixed(0)}%</strong> U&D rate (${udMade}/${udAttempts}). Tour avg ~55%; amateur target 40%+.`,
      recommendation:'Add 2x UP & DONE per week. Focus on chip leave distance — getting inside 5 ft makes the putt automatic.'
    });
    if(threePuttRate>=15)priorities.push({
      level:threePuttRate>=25?1:2,
      score:threePuttRate*1.2,
      area:'PUTTING — 3-PUTT CONTROL',
      metric:`<strong>${threePuttRate.toFixed(0)}%</strong> 3-putt rate (${threePutts}/${totalHoles}). Above 15% usually a lag-distance issue.`,
      recommendation:'Add 2x 3-RANGE PUTTING per week. Emphasize the long-putt sub-stat (25-35 ft).'
    });
    if(penPerRound>=1.5)priorities.push({
      level:penPerRound>=2.5?1:2,
      score:penPerRound*15,
      area:'PENALTIES PER ROUND',
      metric:`<strong>${penPerRound.toFixed(1)}</strong> penalties/round avg (${totalPen} total). Each penalty is a guaranteed stroke lost.`,
      recommendation:'Course management focus. On Fairway Finder, prioritize OB-avoidance over distance. Consider club-down strategy.'
    });
    if(fwPct<45&&fwAttempts>=6)priorities.push({
      level:fwPct<30?1:2,
      score:(60-fwPct)*1.0,
      area:'TEE SHOT — FAIRWAY+ ACCURACY',
      metric:`<strong>${fwPct.toFixed(0)}%</strong> fairway+ on par 4/5 (${fwHits}/${fwAttempts}). Below 45% suggests directional control issues.`,
      recommendation:'Add 2x FAIRWAY FINDER per week. Track miss patterns — if consistently one side, tee strategy can compensate.'
    });
    if(appAttempts>=9){
      // Use approach quality (weighted)
      if(appQuality!==null&&appQuality<35)priorities.push({
        level:appQuality<25?1:2,
        score:(45-appQuality)*1.0,
        area:'APPROACH — PROXIMITY QUALITY',
        metric:`<strong>${appQuality.toFixed(0)}</strong> approach quality (in15ft=100%, on-green=60%, off-green=0%). ${appIn15} stiff / ${appOnGreen} on / ${appOffGreen} off across ${appAttempts} approaches.`,
        recommendation:'Add 2x DEAD YARDAGE + 1x STRIKE LAB. Proximity is the hidden lever — getting inside 15 ft converts dramatically more birdies and easy pars.'
      });
      // Also flag if greens hit rate is low even if quality looks ok
      if(inGreenRate!==null&&inGreenRate<35&&appQuality>=35)priorities.push({
        level:inGreenRate<25?1:2,
        score:(40-inGreenRate)*0.9,
        area:'APPROACH — GREENS HIT RATE',
        metric:`<strong>${inGreenRate.toFixed(0)}%</strong> approaches finishing on green (${appIn15+appOnGreen}/${appAttempts}). Amateur target 35%+.`,
        recommendation:'Add 2x DEAD YARDAGE + 1x STRIKE LAB. Quantity over quality first — get the ball on the dance floor consistently.'
      });
    }
  }

  // PRACTICE-GAME-BASED METRICS (unchanged)
  GAME_IDS.forEach(gid=>{
    const ap=getAvgPct(gid);
    if(ap===null)return;
    const last5=getLastN(gid,5);
    if(last5.length<3)return;
    const g=GAMES[gid];
    const workPct=(g.benchmarks.work/g.max)*100;
    const solidPct=(g.benchmarks.solid/g.max)*100;
    if(ap<workPct){
      priorities.push({
        level:1,
        score:(workPct-ap)*1.2+30,
        area:`PRACTICE — ${g.name}`,
        metric:`<strong>${ap.toFixed(0)}%</strong> last-5 avg, below WORK threshold (${workPct.toFixed(0)}%).`,
        recommendation:`This game is your weakest practice signal. Increase frequency and review fundamentals before iterating on score.`
      });
    }else if(ap<solidPct){
      priorities.push({
        level:2,
        score:(solidPct-ap)*0.8,
        area:`PRACTICE — ${g.name}`,
        metric:`<strong>${ap.toFixed(0)}%</strong> last-5 avg in OK band (target SOLID: ${solidPct.toFixed(0)}%).`,
        recommendation:`Bridge to SOLID threshold. Add 1 extra session/week and track sub-stat trends.`
      });
    }
  });

  priorities.sort((a,b)=>b.score-a.score);
  return{priorities:priorities.slice(0,5),context};
}

/* ===================================================
   DATA MANAGEMENT
=================================================== */
function openDataModal(){
  playSound('click');
  document.getElementById('data-modal').classList.add('open');
  renderDataModalBody();
}
function closeDataModal(){
  document.getElementById('data-modal').classList.remove('open');
}
function renderDataModalBody(){
  const lastBackup=state.lastBackup?fmtDate(state.lastBackup):'never';
  const since=state.lastBackup?daysSince(state.lastBackup):null;
  const totalP=state.practiceSessions.length,totalR=state.rounds.length;
  document.getElementById('data-modal-body').innerHTML=`
    <div class="dm-sec">
      <div class="dm-sec-ttl">📤 EXPORT BACKUP</div>
      <div class="dm-sec-desc">Downloads a single JSON file with all your practice sessions, rounds, and active sessions. Save this to iCloud / Google Drive for cross-device backup.</div>
      <div class="dm-btns">
        <button class="btn btn-primary" onclick="exportData()">▶ EXPORT ALL DATA</button>
      </div>
      <div class="dm-status">
        Last export: <strong>${lastBackup}</strong>${since!==null?' ('+since+' days ago)':''}<br>
        Currently logged: <strong>${totalP}</strong> practice · <strong>${totalR}</strong> rounds
      </div>
    </div>
    <div class="dm-sec">
      <div class="dm-sec-ttl">📥 IMPORT BACKUP</div>
      <div class="dm-sec-desc">Restore from a previously exported JSON file. Choose merge (combine with current data) or replace (wipe and restore from file).</div>
      <div class="dm-btns">
        <button class="btn btn-secondary" onclick="triggerImport('merge')">▶ IMPORT (MERGE)</button>
        <button class="btn btn-danger" onclick="triggerImport('replace')">▶ IMPORT (REPLACE)</button>
      </div>
    </div>
    <div class="dm-sec">
      <div class="dm-sec-ttl">⚠ NUCLEAR OPTION</div>
      <div class="dm-sec-desc">Delete ALL data — practice sessions, rounds, active sessions. Cannot be undone. Export first if you might want it back.</div>
      <div class="dm-btns">
        <button class="btn btn-danger" onclick="wipeAllData()">▶ WIPE ALL DATA</button>
      </div>
    </div>
    <div class="dm-sec">
      <div class="dm-sec-ttl">ℹ SCHEMA INFO</div>
      <div class="dm-sec-desc">Schema version: <strong style="color:var(--yellow)">${SCHEMA_VERSION}</strong>. Future app versions will auto-migrate older exports on import.</div>
    </div>`;
}

function exportData(){
  const payload={
    schema_version:SCHEMA_VERSION,
    exported_at:new Date().toISOString(),
    fairway_lab_v3:{
      practice_sessions:state.practiceSessions
    },
    fairway_lab_rounds_v1:{
      rounds:state.rounds
    },
    active:{
      round:activeRound,
      walk:activeWalk
    },
    meta:{
      lastBackup:state.lastBackup
    }
  };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const stamp=new Date().toISOString().slice(0,10);
  const a=document.createElement('a');
  a.href=url;a.download=`fairway-lab-backup-${stamp}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  state.lastBackup=new Date().toISOString();
  state.bannerDismissedAt=totalLoggedSessions();
  saveMeta();
  playSound('save');
  showToast('BACKUP EXPORTED');
  renderDataModalBody();renderBackupBanner();
}

let importMode='merge';
function triggerImport(mode){
  importMode=mode;
  document.getElementById('import-input').click();
}

function handleImportFile(evt){
  const file=evt.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      processImport(data);
    }catch(err){
      playSound('error');
      showToast('INVALID FILE');
    }
  };
  reader.readAsText(file);
  evt.target.value='';
}

function processImport(data){
  if(!data||typeof data!=='object'){playSound('error');showToast('INVALID FORMAT');return;}
  const incomingPractice=data.fairway_lab_v3?.practice_sessions||[];
  const incomingRounds=data.fairway_lab_rounds_v1?.rounds||[];
  const action=importMode;
  const msg=action==='replace'
    ?`Replace all data with ${incomingPractice.length} practice sessions and ${incomingRounds.length} rounds from file?`
    :`Merge ${incomingPractice.length} practice sessions and ${incomingRounds.length} rounds into your current data? (duplicates by id will be skipped)`;
  promptConfirm('💾 IMPORT DATA',msg,()=>{
    if(action==='replace'){
      state.practiceSessions=incomingPractice;
      state.rounds=incomingRounds;
    }else{
      const existingPIds=new Set(state.practiceSessions.map(s=>s.id));
      const existingRIds=new Set(state.rounds.map(r=>r.id));
      incomingPractice.forEach(s=>{if(!existingPIds.has(s.id))state.practiceSessions.push(s);});
      incomingRounds.forEach(r=>{if(!existingRIds.has(r.id))state.rounds.push(r);});
      // Sort newest first
      state.practiceSessions.sort((a,b)=>new Date(b.date)-new Date(a.date));
      state.rounds.sort((a,b)=>new Date(b.endedAt||b.startedAt)-new Date(a.endedAt||a.startedAt));
    }
    savePractice();saveRounds();
    playSound('save');showToast(action==='replace'?'DATA REPLACED':'DATA MERGED');
    renderDataModalBody();renderContent();
  });
}

function wipeAllData(){
  promptConfirm('☠ WIPE ALL DATA?','This will permanently delete ALL practice sessions, rounds, and active sessions. THIS CANNOT BE UNDONE.<br><br>Export a backup first if you want to be able to restore.',()=>{
    state.practiceSessions=[];
    state.rounds=[];
    activeRound=null;activeWalk=null;
    state.lastBackup=null;state.bannerDismissedAt=0;
    savePractice();saveRounds();saveMeta();saveActiveRound();saveActiveWalk();
    playSound('delete');showToast('ALL DATA WIPED');
    closeDataModal();renderContent();
  });
}

/* ===================================================
   INIT
=================================================== */
loadData();
renderContent();

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this){
  if(activeWalk&&modalGameId==='walk')closeWalkModal();
  else closeModal();
}});
document.getElementById('hole-modal').addEventListener('click',function(e){
  if(e.target===this){
    if(activeWalk&&editingWalkHole!==null)closeWalkHoleModal();
    else closeHoleModal();
  }
});
document.getElementById('data-modal').addEventListener('click',function(e){if(e.target===this)closeDataModal()});
document.getElementById('confirm-modal').addEventListener('click',function(e){if(e.target===this)closeConfirm()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){
  closeModal();closeHoleModal();closeWalkHoleModal();closeDataModal();closeConfirm();
}});
</script>
