<!DOCTYPE html>
<!-- Fairway Lab v3.5 - 2026-04-29 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛳ FAIRWAY LAB v3.5</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;--bg2:#0d0d0d;--bg3:#111;
  --green:#39ff14;--yellow:#ffe600;--red:#ff3030;--orange:#ff8c00;--blue:#00cfff;--purple:#b366ff;
  --dim:#2a2a2a;--dim2:#1a1a1a;--text:#c8c8c8;--text-dim:#555;
  --font-px:'Press Start 2P',monospace;--font-mono:'DM Mono','Courier New',monospace;
  --glow-g:0 0 8px var(--green),0 0 22px rgba(57,255,20,.25);
  --glow-y:0 0 8px var(--yellow),0 0 22px rgba(255,230,0,.25);
  --glow-r:0 0 8px var(--red),0 0 18px rgba(255,48,48,.25);
  --glow-b:0 0 8px var(--blue),0 0 22px rgba(0,207,255,.25);
}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;position:relative;overflow-x:hidden}

/* SCANLINES */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);
}
/* CRT VIGNETTE */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.72) 100%);
}

#app{max-width:880px;margin:0 auto;padding:0 12px 70px}

/* HEADER */
header{
  padding:26px 0 14px;text-align:center;
  border-bottom:2px solid var(--green);margin-bottom:0;position:relative;
}
header .glow-line{height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);margin-top:4px;filter:blur(2px)}
.h-title{font-family:var(--font-px);font-size:clamp(14px,4vw,26px);color:var(--green);
  text-shadow:var(--glow-g);letter-spacing:4px;animation:flicker 5s infinite}
.h-sub{font-size:9px;color:var(--text-dim);letter-spacing:3px;margin-top:7px}
.cursor::after{content:'_';animation:blink 1s step-end infinite}

/* TABS */
.tabs{display:flex;background:var(--bg2);border:2px solid var(--dim);border-top:none;margin-bottom:20px}
.tab-btn{
  flex:1;padding:11px 4px;font-family:var(--font-px);font-size:clamp(5px,1.4vw,8px);
  background:none;border:none;color:var(--text-dim);cursor:pointer;
  border-right:1px solid var(--dim);position:relative;transition:all .12s;letter-spacing:1px;
}
.tab-btn:last-child{border-right:none}
.tab-btn:hover{color:var(--green);background:rgba(57,255,20,.04)}
.tab-btn.active{color:var(--green);background:rgba(57,255,20,.07);text-shadow:0 0 8px var(--green)}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--green);box-shadow:0 0 6px var(--green)}

/* BACKUP BANNER */
.backup-banner{
  background:rgba(255,140,0,.08);border:2px solid var(--orange);
  padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;
  font-family:var(--font-mono);font-size:11px;color:var(--orange);
}
.backup-banner-msg{flex:1;line-height:1.5}
.backup-banner-btn{
  font-family:var(--font-px);font-size:7px;padding:7px 11px;
  background:none;border:2px solid var(--orange);color:var(--orange);cursor:pointer;letter-spacing:1px;
}
.backup-banner-btn:hover{background:rgba(255,140,0,.12);box-shadow:0 0 8px rgba(255,140,0,.3)}
.backup-banner-x{
  background:none;border:none;color:var(--orange);font-size:14px;cursor:pointer;padding:4px 6px;
}

/* BUTTONS */
.btn{
  font-family:var(--font-px);font-size:7px;padding:8px 11px;cursor:pointer;
  background:none;border:2px solid var(--dim);color:var(--text);transition:all .12s;letter-spacing:1px;
}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn-primary{border-color:var(--green);color:var(--green)}
.btn-primary:hover{background:rgba(57,255,20,.08);box-shadow:var(--glow-g)}
.btn-secondary{border-color:var(--yellow);color:var(--yellow)}
.btn-secondary:hover{background:rgba(255,230,0,.08);box-shadow:var(--glow-y)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(255,48,48,.08);box-shadow:var(--glow-r)}
.btn-blue{border-color:var(--blue);color:var(--blue)}
.btn-blue:hover{background:rgba(0,207,255,.08);box-shadow:var(--glow-b)}

/* GAME CARDS */
.games-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.game-card{
  background:var(--bg2);border:2px solid var(--dim);padding:16px;cursor:pointer;
  transition:all .15s;position:relative;overflow:hidden;
}
.game-card::before,.game-card::after{
  content:'';position:absolute;width:8px;height:8px;border:2px solid var(--green);
  opacity:0;transition:opacity .15s;
}
.game-card::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.game-card::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
.game-card:hover{border-color:var(--green);box-shadow:0 0 14px rgba(57,255,20,.15)}
.game-card:hover::before,.game-card:hover::after{opacity:1}
.card-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-emoji{font-size:24px}
.card-name{font-family:var(--font-px);font-size:9px;color:var(--green);letter-spacing:1px}
.card-desc{font-size:10px;color:var(--text-dim);margin-bottom:14px;line-height:1.5}
.card-avg-label{font-family:var(--font-px);font-size:6px;color:var(--text-dim);margin-bottom:4px}
.card-avg-val{font-family:var(--font-px);font-size:13px;color:var(--yellow);text-shadow:var(--glow-y);margin-bottom:8px}
.avg-bar{height:4px;background:var(--dim);position:relative;overflow:hidden;margin-bottom:12px}
.avg-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow));transition:width .35s}
.card-btns{display:flex;gap:8px}
.card-btns .btn{flex:1;text-align:center}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;padding:14px}
.modal-ov.open{display:flex}
.modal-box{background:var(--bg2);border:2px solid var(--green);box-shadow:var(--glow-g);max-width:600px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-titlebar{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:2px solid var(--dim)}
.modal-gtitle{font-family:var(--font-px);font-size:9px;color:var(--green);display:flex;align-items:center;gap:10px}
.modal-close{background:none;border:2px solid var(--red);color:var(--red);font-family:var(--font-px);font-size:7px;padding:5px 8px;cursor:pointer}
.modal-close:hover{background:var(--red);color:var(--bg)}
.modal-stabs{display:flex;border-bottom:2px solid var(--dim)}
.modal-stab{flex:1;padding:9px;font-family:var(--font-px);font-size:6px;background:none;border:none;color:var(--text-dim);cursor:pointer;border-right:1px solid var(--dim);transition:all .12s}
.modal-stab:last-child{border-right:none}
.modal-stab.active{color:var(--yellow);background:rgba(255,230,0,.05);text-shadow:0 0 6px var(--yellow)}
.modal-body{padding:18px}

/* RULES */
.rules-sec{margin-bottom:16px}
.rules-ttl{font-family:var(--font-px);font-size:7px;color:var(--yellow);margin-bottom:9px;border-left:3px solid var(--yellow);padding-left:8px}
.rules-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:10px;gap:8px}
.rules-row span:first-child{flex:1}
.rpts{font-family:var(--font-px);font-size:8px;color:var(--green);white-space:nowrap}
.rpts.neg{color:var(--red)}
.rpts.bonus{color:var(--blue)}
.rules-note{font-size:10px;line-height:1.7;color:var(--text-dim);padding:10px;background:rgba(255,230,0,.04);border:1px solid rgba(255,230,0,.15);margin-top:8px}

/* LOG FORM */
.log-form .field{margin-bottom:14px}
.log-form label{display:block;font-family:var(--font-px);font-size:6px;color:var(--yellow);margin-bottom:6px}
.log-form input,.log-form textarea,.log-form select{
  width:100%;background:var(--bg);border:2px solid var(--dim);color:var(--text);
  font-family:var(--font-mono);font-size:13px;padding:9px;outline:none;
  transition:border-color .12s,box-shadow .12s
}
.log-form input:focus,.log-form textarea:focus,.log-form select:focus{border-color:var(--green);box-shadow:0 0 8px rgba(57,255,20,.25)}
.log-form textarea{height:72px;resize:vertical}
.bm-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;padding:10px;background:var(--bg);border:1px solid var(--dim)}
.bm-chip{font-family:var(--font-px);font-size:6px;padding:3px 7px;border:1px solid}
.bm-work{color:var(--red);border-color:var(--red)}
.bm-ok{color:var(--orange);border-color:var(--orange)}
.bm-solid{color:var(--yellow);border-color:var(--yellow)}
.bm-excellent{color:var(--green);border-color:var(--green)}
.btn-save{
  width:100%;padding:13px;font-family:var(--font-px);font-size:9px;
  background:var(--green);color:var(--bg);border:none;cursor:pointer;letter-spacing:2px;transition:all .1s
}
.btn-save:hover{box-shadow:var(--glow-g);filter:brightness(1.1)}
.err-msg{color:var(--red);font-family:var(--font-px);font-size:7px;margin-top:10px;text-align:center;min-height:16px}

/* PROGRESS */
.filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.filter-btn{padding:6px 11px;font-family:var(--font-px);font-size:6px;background:none;border:2px solid var(--dim);color:var(--text-dim);cursor:pointer;transition:all .12s}
.filter-btn:hover{border-color:var(--green);color:var(--green)}
.filter-btn.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,230,0,.05)}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-box{background:var(--bg2);border:2px solid var(--dim);padding:13px 8px;text-align:center;position:relative}
.stat-box::before{content:'';position:absolute;top:-1px;left:-1px;width:6px;height:6px;border-top:2px solid var(--dim);border-left:2px solid var(--dim)}
.stat-val{font-family:var(--font-px);font-size:15px;color:var(--green);text-shadow:0 0 10px var(--green);margin-bottom:5px}
.stat-lbl{font-family:var(--font-px);font-size:5px;color:var(--text-dim);line-height:1.8}
.chart-wrap{background:var(--bg2);border:2px solid var(--dim);padding:14px;margin-bottom:22px}
.chart-ttl{font-family:var(--font-px);font-size:7px;color:var(--text-dim);margin-bottom:12px}
#chart-svg{width:100%;display:block}
.slog-ttl{font-family:var(--font-px);font-size:7px;color:var(--text-dim);margin-bottom:12px;border-bottom:1px solid var(--dim);padding-bottom:8px}
.sitem{
  background:var(--bg2);border:1px solid var(--dim);border-left:3px solid var(--dim2);
  padding:11px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px
}
.sitem.grade-excellent{border-left-color:var(--green)}
.sitem.grade-solid{border-left-color:var(--yellow)}
.sitem.grade-ok{border-left-color:var(--orange)}
.sitem.grade-work{border-left-color:var(--red)}
.sitem-emoji{font-size:20px;flex-shrink:0;line-height:1}
.sitem-info{flex:1;min-width:0}
.sitem-name{font-family:var(--font-px);font-size:7px;color:var(--text);margin-bottom:3px}
.sitem-date{font-size:9px;color:var(--text-dim);margin-bottom:3px}
.sitem-sub{font-size:9px;color:#777;margin-bottom:2px}
.sitem-notes{font-size:9px;color:#666;font-style:italic}
.sitem-right{text-align:right;flex-shrink:0}
.sitem-score{font-family:var(--font-px);font-size:12px;color:var(--green)}
.sitem-pct{font-size:9px;color:var(--text-dim);margin-bottom:4px}
.grade-badge{font-family:var(--font-px);font-size:6px;padding:2px 5px;border:1px solid;display:inline-block;margin-bottom:5px}
.grade-badge.grade-excellent{color:var(--green);border-color:var(--green)}
.grade-badge.grade-solid{color:var(--yellow);border-color:var(--yellow)}
.grade-badge.grade-ok{color:var(--orange);border-color:var(--orange)}
.grade-badge.grade-work{color:var(--red);border-color:var(--red)}
.no-data{text-align:center;padding:44px 20px;font-family:var(--font-px);font-size:7px;color:var(--text-dim);line-height:2.4}

/* FOCUSES TAB */
.foc-hdr{font-family:var(--font-px);font-size:9px;color:var(--green);margin-bottom:14px}
.foc-sub{font-size:10px;color:var(--text-dim);margin-bottom:20px;line-height:1.7}
.foc-sec{background:var(--bg2);border:2px solid var(--dim);padding:16px;margin-bottom:14px;position:relative}
.foc-sec::before{content:'';position:absolute;top:-1px;left:-1px;width:8px;height:8px;border-top:2px solid var(--yellow);border-left:2px solid var(--yellow)}
.foc-sec-ttl{font-family:var(--font-px);font-size:8px;color:var(--yellow);margin-bottom:12px;letter-spacing:1px}
.foc-priority{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--bg);border-left:4px solid var(--red);margin-bottom:8px;
}
.foc-priority.lvl-2{border-left-color:var(--orange)}
.foc-priority.lvl-3{border-left-color:var(--yellow)}
.foc-priority.lvl-good{border-left-color:var(--green)}
.foc-rank{
  font-family:var(--font-px);font-size:13px;color:var(--red);
  width:30px;flex-shrink:0;text-align:center;
}
.foc-priority.lvl-2 .foc-rank{color:var(--orange)}
.foc-priority.lvl-3 .foc-rank{color:var(--yellow)}
.foc-priority.lvl-good .foc-rank{color:var(--green)}
.foc-content{flex:1;min-width:0}
.foc-area{font-family:var(--font-px);font-size:8px;color:var(--text);margin-bottom:5px;letter-spacing:1px}
.foc-metric{font-size:11px;color:var(--text-dim);margin-bottom:5px;line-height:1.5}
.foc-metric strong{color:var(--text)}
.foc-rec{font-size:10px;color:#888;line-height:1.6;border-left:2px solid var(--green);padding-left:9px;margin-top:6px}
.foc-empty{text-align:center;padding:30px 16px;font-size:11px;color:var(--text-dim);line-height:1.8}
.foc-empty-ttl{font-family:var(--font-px);font-size:8px;color:var(--yellow);margin-bottom:14px}

/* ON COURSE TAB */
.oc-hdr{font-family:var(--font-px);font-size:9px;color:var(--green);margin-bottom:14px}
.oc-sub{font-size:10px;color:var(--text-dim);margin-bottom:20px;line-height:1.7}
.oc-actions{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.oc-actions .btn{flex:1;min-width:140px;padding:13px;font-size:8px;text-align:center}

.oc-active{background:var(--bg2);border:2px solid var(--green);box-shadow:var(--glow-g);padding:18px;margin-bottom:18px}
.oc-active-ttl{font-family:var(--font-px);font-size:9px;color:var(--green);margin-bottom:6px}
.oc-active-meta{font-size:10px;color:var(--text-dim);margin-bottom:14px;line-height:1.6}
.oc-totals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.oc-tot{background:var(--bg);border:1px solid var(--dim);padding:9px 6px;text-align:center}
.oc-tot-val{font-family:var(--font-px);font-size:11px;color:var(--green);margin-bottom:3px}
.oc-tot-lbl{font-family:var(--font-px);font-size:5px;color:var(--text-dim);line-height:1.6}

.hole-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.hole-row{
  display:flex;align-items:center;gap:8px;padding:9px 11px;
  background:var(--bg);border:1px solid var(--dim);font-size:10px;
}
.hole-row.complete{border-left:3px solid var(--green)}
.hole-row.incomplete{border-left:3px solid var(--orange);background:rgba(255,140,0,.04)}
.hole-num{font-family:var(--font-px);font-size:8px;color:var(--yellow);width:38px;flex-shrink:0}
.hole-detail{flex:1;color:var(--text-dim);font-size:10px;line-height:1.5}
.hole-detail strong{color:var(--text)}
.hole-edit-btn{font-family:var(--font-px);font-size:6px;padding:5px 8px;background:none;border:1px solid var(--dim);color:var(--text-dim);cursor:pointer}
.hole-edit-btn:hover{border-color:var(--yellow);color:var(--yellow)}

.oc-end-btns{display:flex;gap:10px;flex-wrap:wrap}
.oc-end-btns .btn{flex:1;min-width:120px;padding:11px;font-size:8px;text-align:center}

/* HOLE ENTRY MODAL */
.hole-entry .field{margin-bottom:14px}
.hole-entry label{display:block;font-family:var(--font-px);font-size:6px;color:var(--yellow);margin-bottom:7px;letter-spacing:1px}
.choice-row{display:flex;flex-wrap:wrap;gap:7px}
.choice-btn{
  padding:11px 13px;font-family:var(--font-px);font-size:7px;background:var(--bg);
  border:2px solid var(--dim);color:var(--text-dim);cursor:pointer;transition:all .12s;
  flex:1;min-width:80px;text-align:center;letter-spacing:1px;
}
.choice-btn:hover{border-color:var(--green);color:var(--green)}
.choice-btn.active{border-color:var(--green);color:var(--green);background:rgba(57,255,20,.08);box-shadow:0 0 8px rgba(57,255,20,.2)}
.choice-btn.danger.active{border-color:var(--red);color:var(--red);background:rgba(255,48,48,.08);box-shadow:0 0 8px rgba(255,48,48,.2)}
.choice-btn.warn.active{border-color:var(--orange);color:var(--orange);background:rgba(255,140,0,.08);box-shadow:0 0 8px rgba(255,140,0,.2)}

.num-pad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.num-btn{
  padding:14px 6px;font-family:var(--font-px);font-size:11px;background:var(--bg);
  border:2px solid var(--dim);color:var(--text-dim);cursor:pointer;text-align:center;transition:all .12s;
}
.num-btn:hover{border-color:var(--green);color:var(--green)}
.num-btn.active{border-color:var(--green);color:var(--green);background:rgba(57,255,20,.08);box-shadow:0 0 8px rgba(57,255,20,.2)}

.hole-entry .conditional{display:none;border-left:2px solid var(--yellow);padding-left:11px;margin-left:4px;margin-bottom:14px}
.hole-entry .conditional.show{display:block}

/* DATA MGMT */
.dm-sec{background:var(--bg2);border:2px solid var(--dim);padding:16px;margin-bottom:14px}
.dm-sec-ttl{font-family:var(--font-px);font-size:8px;color:var(--purple);margin-bottom:10px;letter-spacing:1px}
.dm-sec-desc{font-size:10px;color:var(--text-dim);line-height:1.6;margin-bottom:12px}
.dm-btns{display:flex;gap:10px;flex-wrap:wrap}
.dm-btns .btn{flex:1;min-width:120px;padding:11px;font-size:8px;text-align:center}
.dm-status{font-size:10px;color:var(--text-dim);margin-top:10px;line-height:1.5}
.dm-status strong{color:var(--yellow)}

/* COURSE PRESET */
.course-presets{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.course-preset-btn{
  font-family:var(--font-mono);font-size:11px;padding:5px 9px;
  background:var(--bg);border:1px solid var(--dim);color:var(--text-dim);cursor:pointer;
}
.course-preset-btn:hover{border-color:var(--green);color:var(--green)}

/* SAVE WALK PROMPT */
.walk-save-prompt{background:var(--bg2);border:2px solid var(--blue);box-shadow:var(--glow-b);padding:18px;margin-bottom:14px}
.walk-save-ttl{font-family:var(--font-px);font-size:8px;color:var(--blue);margin-bottom:10px}
.walk-save-txt{font-size:11px;color:var(--text-dim);line-height:1.6;margin-bottom:14px}
.walk-save-btns{display:flex;gap:10px;flex-wrap:wrap}
.walk-save-btns .btn{flex:1;min-width:140px;padding:11px;font-size:7px}

/* CONFIRM */
.confirm-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:1100;align-items:center;justify-content:center;padding:14px}
.confirm-ov.open{display:flex}
.confirm-box{background:var(--bg2);border:2px solid var(--red);box-shadow:var(--glow-r);padding:26px;max-width:380px;width:100%;text-align:center}
.confirm-ttl{font-family:var(--font-px);font-size:9px;color:var(--red);margin-bottom:12px}
.confirm-txt{font-size:11px;color:var(--text-dim);margin-bottom:20px;line-height:1.7}
.confirm-btns{display:flex;gap:10px}
.confirm-btns .btn{flex:1;padding:11px;font-size:7px}

/* TOAST */
.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);
  background:var(--bg2);border:2px solid var(--green);box-shadow:var(--glow-g);
  padding:11px 22px;font-family:var(--font-px);font-size:8px;color:var(--green);
  z-index:2000;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ANIMS */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes flicker{0%,93%,100%{opacity:1}94%{opacity:.75}95%{opacity:1}97%{opacity:.88}}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--dim)}

@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .games-grid{grid-template-columns:1fr}
  .oc-totals{grid-template-columns:repeat(2,1fr)}
}
</style>

<script>
/* ===================================================
   SCHEMA VERSION
=================================================== */
const SCHEMA_VERSION = 2;

/* ===================================================
   GAME CONFIG
=================================================== */
const GAMES = {
  'fairway-finder':{
    name:'FAIRWAY FINDER',emoji:'🏌️',desc:'DRIVING — 20 drives, hit the corridor + distance bonus',max:120,
    benchmarks:{work:45,solid:65,excellent:80},
    subStats:[
      {key:'longDrives',label:'DRIVES OVER 250 YDS (BONUS +1 EACH)',type:'number',min:0,max:20}
    ]
  },
  'strike-lab':{
    name:'STRIKE LAB',emoji:'⛳',desc:'IRONS — 15 shots, pure strikes',max:75,
    benchmarks:{work:35,solid:50,excellent:63},subStats:[]
  },
  'dead-yardage':{
    name:'DEAD YARDAGE',emoji:'🎯',desc:'WEDGES — 15 shots to 3 yardages',max:75,
    benchmarks:{work:35,solid:50,excellent:63},
    subStats:[{key:'yardages',label:'YARDAGES USED',type:'text',placeholder:'e.g. 50, 75, 100 yds'}]
  },
  'putting':{
    name:'3-RANGE PUTTING',emoji:'🕳️',desc:'PUTTING — Long/mid/short + mandatory 3-footer',max:70,
    benchmarks:{work:28,solid:38,excellent:52},
    subStats:[
      {key:'shortMakes',label:'SHORT MAKES (of 6)',type:'number',min:0,max:6},
      {key:'mediumMakes',label:'MEDIUM MAKES (of 5)',type:'number',min:0,max:5}
    ]
  },
  'up-done':{
    name:'UP & DONE',emoji:'🏖️',desc:'CHIPPING — 8 chip-then-putt holes',max:48,
    benchmarks:{work:14,solid:22,excellent:32},
    subStats:[{key:'upAndDowns',label:'UP & DOWNS MADE (of 8)',type:'number',min:0,max:8}]
  },
  'walk':{
    name:'3-4 HOLE WALK',emoji:'🚶',desc:'FIELD PRACTICE — open-ended hole-by-hole reps',max:100,
    benchmarks:{work:45,solid:60,excellent:75},
    subStats:[],
    isField:true
  }
};
const GAME_IDS = Object.keys(GAMES);

/* Walk game category weights (sum to 1.0) — approach + chip = 50% combined */
const WALK_WEIGHTS = {
  approach: 0.25,
  chip:     0.25,
  ud:       0.20,
  putt:     0.15,
  tee:      0.15
};
/* Minimum reps to score each walk category */
const WALK_MIN_REPS = {
  approach: 3,
  chip:     3,
  putt:     3,
  ud:       2,  // missed-green opportunities
  tee:      2   // par-4/5 holes played (par 3s excluded)
};

/* Approach bucket scoring weights (% credit toward approach quality) */
const APPROACH_BUCKET_PCT = {
  'in15':       100,
  'on-green':    60,
  'off-green':    0
};

/* Chip bucket scoring weights */
const CHIP_BUCKET_PCT = {
  'in5':       100,
  'out5':       50,
  'double':      0
};

/* ===================================================
   RULES HTML
=================================================== */
const RULES_HTML = {
  'fairway-finder':`
    <div class="rules-sec">
      <div class="rules-ttl">20 DRIVES — MAX 120 PTS</div>
      <div class="rules-row"><span>Dead center (within 10 yds of center line)</span><span class="rpts">5 pts</span></div>
      <div class="rules-row"><span>Fairway corridor (inside the cones)</span><span class="rpts">3 pts</span></div>
      <div class="rules-row"><span>Slight miss (edge of rough)</span><span class="rpts">1 pt</span></div>
      <div class="rules-row"><span>Clear miss</span><span class="rpts">0 pts</span></div>
      <div class="rules-row"><span>OB simulated (beyond far rough marker)</span><span class="rpts neg">−2 pts</span></div>
      <div class="rules-row"><span>BONUS: Drive carries over 250 yds</span><span class="rpts bonus">+1 pt</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">SETUP</div>
      <div class="rules-note">Use cones or range targets to define a fairway corridor (~30 yds wide). Dead center = within 10 yds of center line. OB = beyond extreme left/right marker. Hit all 20 drives in sequence, no re-hits. Track distance honestly — the +1 bonus rewards hitting the corridor with real swing speed, not just tickling it down the middle.</div>
    </div>`,
  'strike-lab':`
    <div class="rules-sec">
      <div class="rules-ttl">15 IRON SHOTS — MAX 75 PTS</div>
      <div class="rules-row"><span>Pure strike + ball finishes inside 15 yds of target</span><span class="rpts">5 pts</span></div>
      <div class="rules-row"><span>Pure strike, ball finishes outside target circle</span><span class="rpts">3 pts</span></div>
      <div class="rules-row"><span>Thin or fat strike, but lands on target</span><span class="rpts">2 pts</span></div>
      <div class="rules-row"><span>Poor strike + misses target</span><span class="rpts">0 pts</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">SETUP</div>
      <div class="rules-note">Pick a target at your normal iron distance. Use alignment sticks or towels to define a 15-yd radius circle. Pure strike = ball-first contact with compression through impact, clean divot after ball position.</div>
    </div>`,
  'dead-yardage':`
    <div class="rules-sec">
      <div class="rules-ttl">15 SHOTS — 5 PER YARDAGE — MAX 75 PTS</div>
      <div class="rules-row"><span>Finishes inside 2 yds of target</span><span class="rpts">5 pts</span></div>
      <div class="rules-row"><span>Finishes 2–4 yds from target</span><span class="rpts">4 pts</span></div>
      <div class="rules-row"><span>Finishes 4–7 yds from target</span><span class="rpts">3 pts</span></div>
      <div class="rules-row"><span>Finishes 7–10 yds from target</span><span class="rpts">2 pts</span></div>
      <div class="rules-row"><span>Outside 10 yds</span><span class="rpts">0 pts</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">SETUP</div>
      <div class="rules-note">Choose 3 yardages covering your scoring zone (e.g. 50, 75, 100 yds). Hit 5 shots at each. Log the yardages used — consistency of target selection is part of the drill. Rotate yardages each session.</div>
    </div>`,
  'putting':`
    <div class="rules-sec">
      <div class="rules-ttl">LONG PUTTS — 4 PUTTS (25–35 FT) — MAX 12 PTS</div>
      <div class="rules-row"><span>Ball finishes inside 24 inches</span><span class="rpts">3 pts</span></div>
      <div class="rules-row"><span>Ball finishes inside 36 inches</span><span class="rpts">1 pt</span></div>
      <div class="rules-row"><span>Outside 36 inches</span><span class="rpts">0 pts</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">MEDIUM PUTTS — 5 PUTTS (12–18 FT) — MAX 25 PTS</div>
      <div class="rules-row"><span>Make the putt</span><span class="rpts">5 pts</span></div>
      <div class="rules-row"><span>Tap-in leave (&lt;18 in from hole)</span><span class="rpts">2 pts</span></div>
      <div class="rules-row"><span>Miss</span><span class="rpts">0 pts</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">SHORT PUTTS — 6 PUTTS (4–6 FT) — MAX 24 PTS</div>
      <div class="rules-row"><span>Make the putt</span><span class="rpts">4 pts</span></div>
      <div class="rules-row"><span>Miss</span><span class="rpts">0 pts</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">MANDATORY 3-FOOTER (AT END)</div>
      <div class="rules-row"><span>Make it — no penalty</span><span class="rpts">0 pts</span></div>
      <div class="rules-row"><span>Miss it — penalty applied</span><span class="rpts neg">−5 pts</span></div>
    </div>
    <div class="rules-note">Track short makes (of 6) and medium makes (of 5) as sub-stats for trend analysis. The 3-footer is non-negotiable — this simulates clutch pressure scoring.</div>`,
  'up-done':`
    <div class="rules-sec">
      <div class="rules-ttl">8 CHIP-THEN-PUTT HOLES — MAX 48 PTS</div>
      <div class="rules-row"><span>Chip-in (hole out from off green)</span><span class="rpts">6 pts</span></div>
      <div class="rules-row"><span>Up & Done (chip + 1-putt)</span><span class="rpts">4 pts</span></div>
      <div class="rules-row"><span>2-putt after chip</span><span class="rpts">1 pt</span></div>
      <div class="rules-row"><span>3+ putts after chip</span><span class="rpts">0 pts</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">SETUP</div>
      <div class="rules-note">Chip from various lies (fairway cut, rough, tight lie) within 30 yds of hole. Set up 8 different locations around the green. Chip first, then finish the putt — no gimmes. Track how many up-and-dones (4-pt outcomes) you complete as your key sub-stat.</div>
    </div>`,
  'walk':`
    <div class="rules-sec">
      <div class="rules-ttl">FIELD PRACTICE — PERCENTAGE-BASED SCORING</div>
      <div class="rules-note" style="margin-top:0">An open-ended on-course practice game. Walk any number of holes (start, log hole-by-hole, end whenever light or pace dies). First-ball outcomes count as primary; bonus reps build practice volume on approach, chip, and putt without polluting your real-game stats.</div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">FIVE SCORED CATEGORIES</div>
      <div class="rules-row"><span>APPROACH — weighted % across reps (in 15ft / on green / off)</span><span class="rpts">25%</span></div>
      <div class="rules-row"><span>CHIP — weighted % across reps (in 5ft / out / double)</span><span class="rpts">25%</span></div>
      <div class="rules-row"><span>UP & DOWN — % converted on missed greens (first ball)</span><span class="rpts">20%</span></div>
      <div class="rules-row"><span>PUTT — % holed of primary short putts (under 10 ft)</span><span class="rpts">15%</span></div>
      <div class="rules-row"><span>TEE SHOT — % fairway+ on par 4/5 holes (first ball)</span><span class="rpts">15%</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">BUCKET CREDIT</div>
      <div class="rules-row"><span>Approach inside 15 ft</span><span class="rpts">100%</span></div>
      <div class="rules-row"><span>Approach on green (15+ ft)</span><span class="rpts">60%</span></div>
      <div class="rules-row"><span>Approach off green</span><span class="rpts">0%</span></div>
      <div class="rules-row"><span>Chip-in (any bucket + 0 putts)</span><span class="rpts bonus">120%</span></div>
      <div class="rules-row"><span>Chip inside 5 ft</span><span class="rpts">100%</span></div>
      <div class="rules-row"><span>Chip outside 5 ft</span><span class="rpts">50%</span></div>
      <div class="rules-row"><span>Double chip / chunk</span><span class="rpts">0%</span></div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">CHIP-IN DETECTION & U&D AUTO-DERIVE</div>
      <div class="rules-note" style="margin-top:0">When you log 0 putts on a hole with a primary chip, the chip is treated as holed-out (chip-in) and gets the 120% bonus. On U&D opportunity holes, the result auto-derives from chip + putt count: 0 putts = chip-in, 1 putt = converted, 2+ putts = failed. Double chip with any putts always = failed.</div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">PAR 3 HANDLING</div>
      <div class="rules-note" style="margin-top:0">On par 3s, the tee shot IS the approach. Tap PAR 3 on the tee question; the result feeds the approach bucket question instead. Par 3 holes are excluded from tee-shot accuracy stats.</div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">SAMPLE SIZE THRESHOLDS</div>
      <div class="rules-row"><span>Approach / Chip / Putt</span><span class="rpts">3+ reps</span></div>
      <div class="rules-row"><span>Up & Down</span><span class="rpts">2+ misses</span></div>
      <div class="rules-row"><span>Tee shot</span><span class="rpts">2+ par-4/5 holes</span></div>
      <div class="rules-note">Categories below the threshold are excluded from the composite. Composite is reweighted across qualifying categories only — small sessions still get a fair score.</div>
    </div>
    <div class="rules-sec">
      <div class="rules-ttl">SAVE TO PERFORMANCE</div>
      <div class="rules-note" style="margin-top:0">At session end, choose whether to save first-ball stats as a CASUAL WALK in your On Course log. Bonus reps stay only in the Walk record — performance trends pull only from primary shots. Incomplete holes don't save.</div>
    </div>`
};

/* ===================================================
   STATE
=================================================== */
let state = {
  practiceSessions: [],   // existing fairway-lab-v3 sessions (range games + walk)
  rounds: [],             // new on-course rounds + casual walks
  lastBackup: null,       // ISO timestamp of last export
  bannerDismissedAt: 0    // counter value when last dismissed
};
let currentTab = 'games';
let filterGame = 'all';
let modalGameId = null;
let modalSubTab = 'rules';
let delConfirmId = null;
let audioCtx = null;

/* On-course in-progress round */
let activeRound = null;
let editingHoleNumber = null;
let holeDraft = null;

/* Walk-in-progress session */
let activeWalk = null;
let editingWalkHole = null;
let walkDraft = null;

/* Pending confirm action */
let pendingConfirm = null;

/* Walk-end pending live score (for save prompt buttons) */
let pendingWalkLive = null;

/* ===================================================
   STORAGE
=================================================== */
const PRACTICE_KEY = 'fairway-lab-v3';
const ROUNDS_KEY = 'fairway-lab-rounds-v1';
const META_KEY = 'fairway-lab-meta-v1';
const ACTIVE_ROUND_KEY = 'fairway-lab-active-round';
const ACTIVE_WALK_KEY = 'fairway-lab-active-walk';

function loadData(){
  try{const r=localStorage.getItem(PRACTICE_KEY);if(r)state.practiceSessions=JSON.parse(r)}catch(e){state.practiceSessions=[]}
  try{const r=localStorage.getItem(ROUNDS_KEY);if(r)state.rounds=JSON.parse(r)}catch(e){state.rounds=[]}
  try{
    const r=localStorage.getItem(META_KEY);
    if(r){const m=JSON.parse(r);state.lastBackup=m.lastBackup||null;state.bannerDismissedAt=m.bannerDismissedAt||0;}
  }catch(e){}
  try{const r=localStorage.getItem(ACTIVE_ROUND_KEY);if(r)activeRound=JSON.parse(r)}catch(e){activeRound=null}
  try{const r=localStorage.getItem(ACTIVE_WALK_KEY);if(r)activeWalk=JSON.parse(r)}catch(e){activeWalk=null}
  migrateIfNeeded();
}

/* Migrate v1 round/walk data to v2 schema (par + new approach buckets) */
function migrateIfNeeded(){
  let migrated=false;
  state.rounds.forEach(r=>{
    if(!r.schemaVersion||r.schemaVersion<2){
      r.schemaVersion=2;migrated=true;
      r.holes.forEach(h=>{
        if(h.par===undefined)h.par=4;  // default par 4
        // Migrate light rough → fairway (collapse to 2-bucket)
        if(h.tee==='light')h.tee='fairway';
        // Migrate GIR Y/N → approach bucket
        if(h.approach===undefined){
          if(h.gir===true)h.approach='on-green';      // default to on-green; user can edit
          else if(h.gir===false)h.approach='off-green';
          else h.approach=null;
        }
        // First-putt distance bucket — unknown for v1 data
        if(h.firstPuttDist===undefined)h.firstPuttDist=null;
      });
    }
  });
  state.practiceSessions.forEach(s=>{
    if(s.gameId==='walk'&&s.walkData&&s.walkData.holes){
      let walkMig=false;
      s.walkData.holes.forEach(h=>{
        if(h.par===undefined){h.par=4;walkMig=true;}
        if(h.tee==='light'){h.tee='fairway';walkMig=true;}
        // Migrate old approachReps (had {primary,in30}) to new {primary,bucket}
        if(h.approachReps){
          h.approachReps.forEach(r=>{
            if(r.bucket===undefined&&r.in30!==undefined){
              r.bucket=r.in30?'in15':'on-green';  // best guess
              delete r.in30;walkMig=true;
            }
          });
        }
        // Migrate chipReps (had {primary,in10ft}) to new {primary,bucket}
        if(h.chipReps){
          h.chipReps.forEach(r=>{
            if(r.bucket===undefined&&r.in10ft!==undefined){
              r.bucket=r.in10ft?'in5':'out5';
              delete r.in10ft;walkMig=true;
            }
          });
        }
        // Putt reps: old {primary,fromInside6ft,holed} → new {primary,distBucket,holed}
        if(h.puttReps){
          h.puttReps.forEach(r=>{
            if(r.distBucket===undefined&&r.fromInside6ft!==undefined){
              r.distBucket=r.fromInside6ft?'short':'mid';
              delete r.fromInside6ft;walkMig=true;
            }
          });
        }
        // Score on walk hole — null for old data
        if(h.score===undefined)h.score=null;
        // Penalties on walk — 0 for old data
        if(h.penalties===undefined)h.penalties=0;
      });
      if(walkMig)migrated=true;
    }
  });
  if(activeRound&&(!activeRound.schemaVersion||activeRound.schemaVersion<2)){
    activeRound.schemaVersion=2;migrated=true;
    activeRound.holes.forEach(h=>{
      if(h.par===undefined)h.par=4;
      if(h.tee==='light')h.tee='fairway';
      if(h.approach===undefined){
        if(h.gir===true)h.approach='on-green';
        else if(h.gir===false)h.approach='off-green';
        else h.approach=null;
      }
      if(h.firstPuttDist===undefined)h.firstPuttDist=null;
    });
  }
  if(activeWalk&&(!activeWalk.schemaVersion||activeWalk.schemaVersion<2)){
    activeWalk.schemaVersion=2;migrated=true;
    activeWalk.holes.forEach(h=>{
      if(h.par===undefined)h.par=4;
      if(h.tee==='light')h.tee='fairway';
      if(h.approachReps)h.approachReps.forEach(r=>{
        if(r.bucket===undefined&&r.in30!==undefined){r.bucket=r.in30?'in15':'on-green';delete r.in30;}
      });
      if(h.chipReps)h.chipReps.forEach(r=>{
        if(r.bucket===undefined&&r.in10ft!==undefined){r.bucket=r.in10ft?'in5':'out5';delete r.in10ft;}
      });
      if(h.puttReps)h.puttReps.forEach(r=>{
        if(r.distBucket===undefined&&r.fromInside6ft!==undefined){r.distBucket=r.fromInside6ft?'short':'mid';delete r.fromInside6ft;}
      });
      if(h.score===undefined)h.score=null;
      if(h.penalties===undefined)h.penalties=0;
    });
  }
  if(migrated){
    savePractice();saveRounds();saveActiveRound();saveActiveWalk();
  }
}
function savePractice(){localStorage.setItem(PRACTICE_KEY,JSON.stringify(state.practiceSessions))}
function saveRounds(){localStorage.setItem(ROUNDS_KEY,JSON.stringify(state.rounds))}
function saveMeta(){localStorage.setItem(META_KEY,JSON.stringify({lastBackup:state.lastBackup,bannerDismissedAt:state.bannerDismissedAt}))}
function saveActiveRound(){if(activeRound)localStorage.setItem(ACTIVE_ROUND_KEY,JSON.stringify(activeRound));else localStorage.removeItem(ACTIVE_ROUND_KEY)}
function saveActiveWalk(){if(activeWalk)localStorage.setItem(ACTIVE_WALK_KEY,JSON.stringify(activeWalk));else localStorage.removeItem(ACTIVE_WALK_KEY)}

/* ===================================================
   AUDIO (8-bit square wave)
=================================================== */
function playSound(type){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);osc.type='square';
    const map={click:440,save:880,delete:220,error:110,tab:330,gen:550};
    osc.frequency.value=map[type]||440;
    gain.gain.setValueAtTime(0.04,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.12);
    osc.start(audioCtx.currentTime);osc.stop(audioCtx.currentTime+0.12);
    if(type==='save'){
      const osc2=audioCtx.createOscillator();osc2.connect(gain);
      osc2.type='square';osc2.frequency.value=1320;
      osc2.start(audioCtx.currentTime+0.1);osc2.stop(audioCtx.currentTime+0.22);
    }
  }catch(e){}
}

/* ===================================================
   HELPERS
=================================================== */
function uuid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,6)}
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'})
    +' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function fmtDateShort(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
}
function daysSince(iso){
  if(!iso)return null;
  return Math.floor((Date.now()-new Date(iso).getTime())/(1000*60*60*24));
}
function getPct(gid,score){return score/GAMES[gid].max*100}
function getGrade(gid,score){
  const b=GAMES[gid].benchmarks;
  if(score>=b.excellent)return{label:'EXCELLENT',cls:'grade-excellent'};
  if(score>=b.solid)    return{label:'SOLID',    cls:'grade-solid'};
  if(score>=b.work)     return{label:'OK',       cls:'grade-ok'};
  return                      {label:'WORK',     cls:'grade-work'};
}
function getLastN(gid,n){return state.practiceSessions.filter(s=>s.gameId===gid).slice(0,n)}
function getAvgPct(gid){
  const last=getLastN(gid,5);
  if(!last.length)return null;
  return last.reduce((s,x)=>s+x.score,0)/last.length/GAMES[gid].max*100;
}
function getSolidStreak(){
  const src=filterGame==='all'?state.practiceSessions:state.practiceSessions.filter(s=>s.gameId===filterGame);
  let n=0;for(const s of src){if(s.score>=GAMES[s.gameId].benchmarks.solid)n++;else break;}return n;
}
function getStrongestGame(){
  let best=null,bp=-1;
  GAME_IDS.forEach(gid=>{const p=getAvgPct(gid);if(p!==null&&p>bp){bp=p;best=gid;}});
  return best;
}
function getFilteredSessions(){
  return filterGame==='all'?state.practiceSessions:state.practiceSessions.filter(s=>s.gameId===filterGame);
}
function getOverallAvgPct(){
  const src=getFilteredSessions();if(!src.length)return null;
  return(src.reduce((a,s)=>a+getPct(s.gameId,s.score),0)/src.length).toFixed(1);
}
function totalLoggedSessions(){
  return state.practiceSessions.length+state.rounds.length;
}

/* ===================================================
   BACKUP BANNER
=================================================== */
function renderBackupBanner(){
  const slot=document.getElementById('banner-slot');
  const total=totalLoggedSessions();
  const since=state.lastBackup?daysSince(state.lastBackup):null;
  // Trigger banner every 5 sessions past dismissal point
  const sinceDismiss=total-state.bannerDismissedAt;
  const showByCount=sinceDismiss>=5;
  const showByTime=since!==null&&since>=14;
  const neverBacked=state.lastBackup===null&&total>=5;
  if(showByCount||showByTime||neverBacked){
    let msg;
    if(neverBacked)msg=`You've logged ${total} sessions and have never exported a backup.`;
    else if(showByTime)msg=`Last backup: ${since} days ago. Time to export.`;
    else msg=`${sinceDismiss} new sessions since your last backup nudge.`;
    slot.innerHTML=`
      <div class="backup-banner">
        <span style="font-size:18px">💾</span>
        <span class="backup-banner-msg">${msg}</span>
        <button class="backup-banner-btn" onclick="openDataModal()">EXPORT</button>
        <button class="backup-banner-x" onclick="dismissBanner()" title="dismiss">✕</button>
      </div>`;
  }else{slot.innerHTML='';}
}
function dismissBanner(){
  state.bannerDismissedAt=totalLoggedSessions();
  saveMeta();renderBackupBanner();
}

function buildLogForm(gid){
  const g=GAMES[gid];const b=g.benchmarks;
  const subFields=g.subStats.map(ss=>{
    const inp=ss.type==='number'
      ?`<input type="number" id="ss-${ss.key}" min="${ss.min!==undefined?ss.min:0}" ${ss.max!==undefined?'max="'+ss.max+'"':''} placeholder="0">`
      :`<input type="text" id="ss-${ss.key}" placeholder="${ss.placeholder||''}">`;

  }).join('');

      <span class="bm-chip bm-ok">OK ${b.work}–${b.solid-1}</span>

      <span class="bm-chip bm-excellent">EXCELLENT ${b.excellent}+</span>

function submitLog(gid){
  const scoreEl=document.getElementById('log-score');
  const score=parseInt(scoreEl.value);
  const g=GAMES[gid];
  if(isNaN(score)||score<0||score>g.max){
    playSound('error');
    document.getElementById('log-err').textContent='⚠ SCORE MUST BE 0 – '+g.max;
    return;
  }
  const subStats={};
  g.subStats.forEach(ss=>{
    const el=document.getElementById('ss-'+ss.key);
    if(el)subStats[ss.key]=ss.type==='number'?parseInt(el.value)||0:el.value;
  });
  const notes=(document.getElementById('log-notes').value||'').trim();
  state.practiceSessions.unshift({id:uuid(),gameId:gid,score,date:new Date().toISOString(),notes,subStats});
  savePractice();
  playSound('save');
  closeModal();
  showToast('SESSION SAVED — '+score+'/'+g.max+' ('+getPct(gid,score).toFixed(1)+'%)');
  renderContent();
}

/* ===================================================
   CHART
=================================================== */
function drawChart(){
  const svg=document.getElementById('chart-svg');if(!svg)return;
  const filtered=[...getFilteredSessions()].reverse();
  if(filtered.length<2){
    svg.innerHTML=`<text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#333" font-size="8" font-family="'Press Start 2P',monospace">${filtered.length===0?'NO DATA YET':'LOG MORE SESSIONS TO SEE TREND'}</text>`;
    return;
  }
  const W=svg.clientWidth||600,H=180;
  const pl=46,pr=62,pt=12,pb=30;
  const iw=W-pl-pr,ih=H-pt-pb;
  const pts=filtered.map((s,i)=>{
    const pct=getPct(s.gameId,s.score);
    return{x:pl+(i/(filtered.length-1))*iw,y:pt+(1-pct/100)*ih,pct,date:s.date};
  });
  const solidPct=filterGame!=='all'?(GAMES[filterGame].benchmarks.solid/GAMES[filterGame].max*100):65;
  const solidY=(pt+(1-solidPct/100)*ih).toFixed(1);
  const recent=pts.slice(-3),older=pts.length>3?pts.slice(-6,-3):[];
  const rAvg=recent.reduce((a,p)=>a+p.pct,0)/recent.length;
  const oAvg=older.length?older.reduce((a,p)=>a+p.pct,0)/older.length:rAvg-0.1;
  const lc=rAvg>=oAvg?'#39ff14':'#ffe600';
  const grid=[0,25,50,75,100].map(p=>{
    const y=(pt+(1-p/100)*ih).toFixed(1);
    return`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#191919" stroke-width="1"/>
      <text x="${pl-4}" y="${y}" dy="4" text-anchor="end" fill="#444" font-size="8" font-family="DM Mono,monospace">${p}%</text>`;
  }).join('');
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const d1=new Date(filtered[0].date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const d2=new Date(filtered[filtered.length-1].date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  svg.innerHTML=`
    ${grid}
    <line x1="${pl}" y1="${solidY}" x2="${W-pr}" y2="${solidY}" stroke="#ffe600" stroke-dasharray="8,4" stroke-width="1.5" opacity=".7"/>
    <text x="${W-pr+5}" y="${solidY}" dy="4" fill="#ffe600" font-size="7" font-family="'Press Start 2P',monospace">SOLID</text>
    <path d="${pathD}" fill="none" stroke="${lc}" stroke-width="2.5" style="filter:drop-shadow(0 0 5px ${lc})"/>
    ${pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4.5" fill="${lc}" style="filter:drop-shadow(0 0 5px ${lc})"/>`).join('')}
    <text x="${pl}" y="${H-4}" fill="#3a3a3a" font-size="8" font-family="DM Mono,monospace">${d1}</text>
    <text x="${W-pr}" y="${H-4}" text-anchor="end" fill="#3a3a3a" font-size="8" font-family="DM Mono,monospace">${d2}</text>`;
}

function renderActiveRound(){
  const r=activeRound;
  const totalScore=r.holes.reduce((a,h)=>a+(h.score||0),0);
  const totalPar=r.holes.reduce((a,h)=>a+(h.par||0),0);
  const toPar=totalScore-totalPar;
  const toParStr=toPar===0?'E':(toPar>0?'+'+toPar:String(toPar));
  const totalPutts=r.holes.reduce((a,h)=>a+(h.putts||0),0);
  const totalPen=r.holes.reduce((a,h)=>a+(h.penalties||0),0);
  // Fairway % only counts par 4/5 holes
  const teeHoles=r.holes.filter(h=>h.par!==3&&h.tee);
  const fwHits=teeHoles.filter(h=>h.tee==='fairway').length;
  const fwPct=teeHoles.length?Math.round(fwHits/teeHoles.length*100):0;
  const holesComplete=r.holes.length;
  const targetHoles=r.targetHoles;
  const holeRows=r.holes.map(h=>{
    const teeShort=h.par===3?'P3':(h.tee==='fairway'?'FW+':h.tee==='trouble'?'TR':'-');
    const appShort=h.approach==='in15'?'<15':h.approach==='on-green'?'GRN':h.approach==='off-green'?'OFF':'-';
    return `
    <div class="hole-row complete">
      <span class="hole-num">H${h.number}·P${h.par}</span>
      <span class="hole-detail">
        ${h.score?'<strong>'+h.score+'</strong>':'-'}
        · ${teeShort}
        · ${appShort}
        ${h.penalties?' · '+h.penalties+'P':''}
        · ${h.putts}putt
        ${h.udResult?(' · U&D '+(h.udResult==='converted'?'✓':h.udResult==='holed'?'CHIP-IN':'✗')):''}
      </span>
      <button class="hole-edit-btn" onclick="editHole(${h.number})">EDIT</button>
    </div>`;
  }).join('');
  const nextHole=holesComplete+1;
  const canAddNext=targetHoles===0||nextHole<=targetHoles;

  return`
    <div class="oc-active">
      <div class="oc-active-ttl">▶ ACTIVE ROUND</div>
      <div class="oc-active-meta">
        ${r.course||'Unnamed course'} · Started ${fmtDateShort(r.startedAt)}
        · ${targetHoles===0?'open length':targetHoles+' holes'}
        · ${holesComplete}/${targetHoles===0?'?':targetHoles} holes logged
      </div>
      <div class="oc-totals">
        <div class="oc-tot"><div class="oc-tot-val">${totalScore||'-'}</div><div class="oc-tot-lbl">SCORE</div></div>
        <div class="oc-tot"><div class="oc-tot-val">${holesComplete?toParStr:'-'}</div><div class="oc-tot-lbl">TO PAR</div></div>
        <div class="oc-tot"><div class="oc-tot-val">${fwPct}%</div><div class="oc-tot-lbl">FW+</div></div>
        <div class="oc-tot"><div class="oc-tot-val">${totalPutts}</div><div class="oc-tot-lbl">PUTTS</div></div>
      </div>
      ${holesComplete?`<div class="hole-list">${holeRows}</div>`:''}
      <div class="oc-end-btns">
        ${canAddNext?`<button class="btn btn-primary" onclick="openHoleEntry(${nextHole})">▶ LOG HOLE ${nextHole}</button>`:''}
        <button class="btn btn-secondary" onclick="endRound()">END ROUND</button>
        <button class="btn btn-danger" onclick="discardRound()">DISCARD</button>
      </div>
    </div>`;
}

function renderRoundRow(r){
  const totalScore=r.holes.reduce((a,h)=>a+(h.score||0),0);
  const totalPar=r.holes.reduce((a,h)=>a+(h.par||0),0);
  const toPar=totalScore-totalPar;
  const toParStr=toPar===0?'E':(toPar>0?'+'+toPar:String(toPar));
  const totalPutts=r.holes.reduce((a,h)=>a+(h.putts||0),0);
  const totalPen=r.holes.reduce((a,h)=>a+(h.penalties||0),0);
  const teeHoles=r.holes.filter(h=>h.par!==3&&h.tee);
  const fwHits=teeHoles.filter(h=>h.tee==='fairway').length;
  const fwPct=teeHoles.length?Math.round(fwHits/teeHoles.length*100):0;
  const tag=r.sessionType==='casual_walk'?'<span style="color:var(--blue);font-family:var(--font-px);font-size:6px">CASUAL WALK</span>':'<span style="color:var(--green);font-family:var(--font-px);font-size:6px">ROUND</span>';
  return`<div class="sitem">
    <span class="sitem-emoji">⛳</span>
    <div class="sitem-info">
      <div class="sitem-name">${r.course||'UNNAMED'} · ${r.holes.length} HOLES</div>
      <div class="sitem-date">${fmtDate(r.endedAt||r.startedAt)} · ${tag}</div>
      <div class="sitem-sub">${totalScore?totalScore+' ('+toParStr+')':'NO SCORE'} · FW+ ${fwPct}% · ${totalPutts} PUTTS · ${totalPen} PEN</div>
    </div>
    <div class="sitem-right">
      <button class="btn btn-danger" onclick="promptDeleteRound('${r.id}')">DEL</button>
    </div>
  </div>`;
}

function startRound(target){
  if(activeRound){showToast('FINISH OR DISCARD ACTIVE ROUND FIRST');return;}
  let length=target;
  if(target===0){
    const v=prompt('How many holes? (1-18)','9');
    length=parseInt(v);
    if(!length||length<1||length>18){showToast('INVALID LENGTH');return;}
  }
  const course=prompt('Course name (optional)','')||'';
  activeRound={
    id:uuid(),
    sessionType:'round',
    course:course.trim(),
    targetHoles:length,
    startedAt:new Date().toISOString(),
    holes:[],
    schemaVersion:SCHEMA_VERSION
  };
  saveActiveRound();
  playSound('save');
  renderContent();
}

function discardRound(){
  promptConfirm('⚠ DISCARD ROUND?','All hole entries in this active round will be lost.',()=>{
    activeRound=null;saveActiveRound();
    playSound('delete');showToast('ROUND DISCARDED');renderContent();
  });
}

function endRound(){
  if(!activeRound)return;
  if(!activeRound.holes.length){showToast('LOG AT LEAST ONE HOLE FIRST');return;}
  activeRound.endedAt=new Date().toISOString();
  state.rounds.unshift(activeRound);
  saveRounds();
  activeRound=null;saveActiveRound();
  playSound('save');showToast('ROUND SAVED');
  renderContent();
}

function promptDeleteRound(id){
  promptConfirm('⚠ DELETE ROUND?','This action cannot be undone.<br>Remove this round from the log?',()=>{
    state.rounds=state.rounds.filter(r=>r.id!==id);
    saveRounds();playSound('delete');showToast('ROUND DELETED');renderContent();
  });
}

/* ===================================================

=================================================== */
function openHoleEntry(num){
  if(!activeRound)return;
  playSound('click');
  editingHoleNumber=num;
  const existing=activeRound.holes.find(h=>h.number===num);
  // Carry par forward from previous hole (default 4 if first)
  let defaultPar=4;
  if(activeRound.holes.length){
    // Use mode of recent holes — default to 4 anyway
    defaultPar=4;
  }
  holeDraft=existing?JSON.parse(JSON.stringify(existing)):{
    number:num,par:defaultPar,score:null,tee:null,penalties:0,
    approach:null,udOpportunity:null,udResult:null,
    putts:null,firstPuttDist:null
  };
  // Backfill par on existing holes that pre-date schema v2
  if(holeDraft.par===undefined||holeDraft.par===null)holeDraft.par=4;
  document.getElementById('hole-modal-ttl').innerHTML=`HOLE ${num}`;
  document.getElementById('hole-modal').classList.add('open');
  renderHoleEntry();
}

function editHole(num){openHoleEntry(num)}

function closeHoleModal(){
  document.getElementById('hole-modal').classList.remove('open');
  editingHoleNumber=null;holeDraft=null;
}

function renderHoleEntry(){
  const d=holeDraft;
  const isPar3=d.par===3;

        <div class="num-pad">

        </div>
      </div>

      <div class="field">
        <label>TEE SHOT RESULT</label>

          <button class="choice-btn ${d.tee==='fairway'?'active':''}" onclick="setHoleField('tee','fairway')">FAIRWAY+</button>

        <label>TEE SHOT — PAR 3 (RESULT FEEDS APPROACH)</label>
      </div>`}
      <div class="field">
        <label>PENALTIES</label>
        <div class="choice-row">
          ${[0,1,2,3].map(n=>`<button class="choice-btn ${d.penalties===n?(n===0?'active':'danger active'):''}" onclick="setHoleField('penalties',${n})">${n===3?'3+':n}</button>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>APPROACH RESULT (FIRST BALL${isPar3?' — TEE SHOT':''})</label>
        <div class="choice-row">
          <button class="choice-btn ${d.approach==='in15'?'active':''}" onclick="setHoleField('approach','in15')">INSIDE 15 FT</button>
          <button class="choice-btn ${d.approach==='on-green'?'active':''}" onclick="setHoleField('approach','on-green')">ON GREEN</button>
          <button class="choice-btn warn ${d.approach==='off-green'?'active':''}" onclick="setHoleField('approach','off-green')">OFF GREEN</button>
        </div>
      </div>
      <div class="conditional ${showUd?'show':''}">
        <div class="field">

            <button class="choice-btn ${d.udOpportunity===true?'active':''}" onclick="setHoleField('udOpportunity',true)">U&D CHANCE</button>

function setHoleField(field,val){
  playSound('click');
  holeDraft[field]=val;
  // When par changes to/from 3, reset tee
  if(field==='par'&&val===3){holeDraft.tee=null;}
  // When approach changes, reset U&D
  if(field==='approach'){
    if(val!=='off-green'){holeDraft.udOpportunity=null;holeDraft.udResult=null;}
  }
  if(field==='udOpportunity'){
    if(val===false)holeDraft.udResult=null;
  }
  // When putts set to 0, clear first putt distance
  if(field==='putts'&&val===0)holeDraft.firstPuttDist=null;
  renderHoleEntry();
}

function saveHole(){
  const d=holeDraft;
  const isPar3=d.par===3;
  const errs=[];
  if(d.par===null||d.par===undefined)errs.push('PAR');
  if(d.score===null)errs.push('SCORE');
  if(!isPar3&&d.tee===null)errs.push('TEE');
  if(d.approach===null)errs.push('APPROACH');
  if(d.putts===null)errs.push('PUTTS');
  if(d.approach==='off-green'&&d.udOpportunity===null)errs.push('U&D OPP');
  if(d.udOpportunity===true&&d.udResult===null)errs.push('U&D RESULT');
  if(d.putts>=1&&d.firstPuttDist===null)errs.push('1ST PUTT DIST');
  if(errs.length){
    playSound('error');
    document.getElementById('hole-err').textContent='⚠ MISSING: '+errs.join(', ');
    return;
  }
  // Derived: GIR
  d.gir=(d.approach==='in15'||d.approach==='on-green');
  const idx=activeRound.holes.findIndex(h=>h.number===d.number);
  if(idx>=0)activeRound.holes[idx]=d;
  else activeRound.holes.push(d);
  activeRound.holes.sort((a,b)=>a.number-b.number);
  saveActiveRound();
  playSound('save');
  closeHoleModal();
  showToast('HOLE '+d.number+' SAVED');
  renderContent();
}

function openWalkActiveModal(){
  modalGameId='walk';

  document.getElementById('stab-rules').style.display='none';
  document.getElementById('stab-log').style.display='none';

function renderWalkActiveBody(){
  if(!activeWalk){closeWalkModal();return;}
  const w=activeWalk;
  const holesPlayed=w.holes.length;
  const nextHole=holesPlayed+1;
  const live=computeWalkScore(w);
  const holeRows=w.holes.map(h=>{
    const teeShort=h.par===3?'P3':(h.tee==='fairway'?'FW+':h.tee==='trouble'?'TR':'-');
    const primApp=(h.approachReps||[]).find(r=>r.primary);
    const appShort=primApp?(primApp.bucket==='in15'?'<15':primApp.bucket==='on-green'?'GRN':'OFF'):'-';
    // Compute effective U&D result (derived from chip+putt or manual override)
    let udBadge='';
    if(primApp&&primApp.bucket==='off-green'&&h.udOpportunity===true){
      const result=h.udResult||deriveUdResult(h);
      if(result==='converted')udBadge=' · U&D ✓';
      else if(result==='holed')udBadge=' · CHIP-IN ✦';
      else if(result==='failed')udBadge=' · U&D ✗';
    }
    return `
    <div class="hole-row complete">
      <span class="hole-num">H${h.number}·P${h.par||4}</span>
      <span class="hole-detail">
        ${h.score?'<strong>'+h.score+'</strong>':'-'}
        · ${teeShort}
        · ${appShort}
        · APP ${h.approachReps?.length||0}r
        · CHIP ${h.chipReps?.length||0}r
        · PUTT ${h.puttReps?.length||0}r
        ${h.penalties?' · '+h.penalties+'P':''}
        ${udBadge}
      </span>
      <button class="hole-edit-btn" onclick="editWalkHole(${h.number})">EDIT</button>
    </div>`;
  }).join('');

  document.getElementById('modal-body').innerHTML=`
    <div style="margin-bottom:14px;font-size:11px;color:var(--text-dim);line-height:1.7">
      Started ${fmtDateShort(w.startedAt)} · ${holesPlayed} hole${holesPlayed===1?'':'s'} logged
    </div>
    <div class="oc-totals" style="grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px">
      <div class="oc-tot"><div class="oc-tot-val" style="color:var(--yellow)">${live.composite!==null?live.composite.toFixed(1)+'%':'--'}</div><div class="oc-tot-lbl">LIVE COMPOSITE</div></div>
      <div class="oc-tot"><div class="oc-tot-val">${live.score}/100</div><div class="oc-tot-lbl">PROJECTED SCORE</div></div>
    </div>
    ${holesPlayed?`<div class="hole-list">${holeRows}</div>`:''}
    <div class="oc-end-btns" style="margin-bottom:14px">
      <button class="btn btn-primary" onclick="openWalkHoleEntry(${nextHole})">▶ LOG HOLE ${nextHole}</button>
      ${holesPlayed?`<button class="btn btn-secondary" onclick="endWalk()">END SESSION</button>`:''}
      <button class="btn btn-danger" onclick="discardWalk()">DISCARD</button>
    </div>
    ${holesPlayed?renderWalkCategorySummary(live):''}
  `;
}

function renderWalkCategorySummary(live){
  const cats=[
    {key:'tee',label:'TEE SHOT'},
    {key:'approach',label:'APPROACH'},
    {key:'chip',label:'CHIP'},
    {key:'ud',label:'UP & DOWN'},
    {key:'putt',label:'PUTT (SHORT)'}
  ];
  return`<div style="background:var(--bg);border:1px solid var(--dim);padding:11px">
    <div style="font-family:var(--font-px);font-size:6px;color:var(--text-dim);margin-bottom:9px">CATEGORY BREAKDOWN</div>
    ${cats.map(c=>{
      const cd=live.categories[c.key];
      let status;
      if(cd.qualified){
        // For approach/chip, denominator is reps (not percentage of hits) — show pct only
        if(c.key==='approach'||c.key==='chip'){
          status=cd.pct.toFixed(0)+'% ('+cd.denominator+' reps)';
        }else{
          status=cd.pct.toFixed(0)+'% ('+cd.numerator+'/'+cd.denominator+')';
        }
      }else{
        status='<span style="color:var(--text-dim)">need '+WALK_MIN_REPS[c.key]+'+ ('+cd.denominator+' so far)</span>';
      }
      return`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:10px;border-bottom:1px solid rgba(255,255,255,.04)">
        <span style="font-family:var(--font-px);font-size:6px;color:${cd.qualified?'var(--green)':'var(--text-dim)'}">${c.label}</span>
        <span style="font-family:var(--font-mono);font-size:10px">${status}</span>
      </div>`;
    }).join('')}
  </div>`;
}

function discardWalk(){
  promptConfirm('⚠ DISCARD WALK?','All hole entries in this active walk will be lost.',()=>{
    activeWalk=null;saveActiveWalk();
    closeWalkModal();
    playSound('delete');showToast('WALK DISCARDED');renderContent();

/* WALK HOLE ENTRY */
function openWalkHoleEntry(num){
  if(!activeWalk)return;
  playSound('click');
  editingWalkHole=num;
  const existing=activeWalk.holes.find(h=>h.number===num);
  walkDraft=existing?JSON.parse(JSON.stringify(existing)):{
    number:num,
    par:4,                     // default par 4
    score:null,                // optional
    tee:null,                  // 'fairway'|'trouble' (par-4/5 only)
    penalties:0,
    approachReps:[],           // each: {primary:bool, bucket:'in15'|'on-green'|'off-green'|null}
    udOpportunity:null,        // bool|null (when first approach=off-green)
    udResult:null,             // 'converted'|'failed'|'holed'|null
    chipReps:[],               // each: {primary:bool, bucket:'in5'|'out5'|'double'|null}
    puttReps:[]                // each: {primary:bool, distBucket:'long'|'mid'|'short'|null, holed:bool}
  };
  // Backfill par on edits of pre-v2 holes
  if(walkDraft.par===undefined||walkDraft.par===null)walkDraft.par=4;
  if(walkDraft.penalties===undefined)walkDraft.penalties=0;
  if(walkDraft.score===undefined)walkDraft.score=null;
  document.getElementById('hole-modal-ttl').innerHTML=`🚶 WALK HOLE ${num}`;
  document.getElementById('hole-modal').classList.add('open');
  renderWalkHoleEntry();
}

function editWalkHole(num){openWalkHoleEntry(num)}

function closeWalkHoleModal(){
  document.getElementById('hole-modal').classList.remove('open');
  editingWalkHole=null;walkDraft=null;
  if(activeWalk)renderWalkActiveBody();
}

function bucketLabel(field,bucket){
  if(field==='approach')return bucket==='in15'?'<15 FT':bucket==='on-green'?'ON GREEN':bucket==='off-green'?'OFF GREEN':'?';
  if(field==='chip')return bucket==='in5'?'<5 FT':bucket==='out5'?'OUT >5':bucket==='double'?'DOUBLE':'?';
  if(field==='putt')return bucket==='long'?'LONG (25+)':bucket==='mid'?'MID (10-25)':bucket==='short'?'SHORT (<10)':'?';
  return '?';
}

function renderWalkHoleEntry(){
  const d=walkDraft;

  const canDerive=showUd&&d.udOpportunity===true&&primChip&&primChip.bucket;
  const derivedResult=canDerive?deriveUdResult(d):null;

  const approachBtns=d.approachReps.map((r,i)=>`

function setWalkField(field,val){
  playSound('click');
  // Coerce 'null' string from button onclick to actual null
  if(val==='null')val=null;
  walkDraft[field]=val;
  // When par changes to 3, clear tee
  if(field==='par'&&val===3)walkDraft.tee=null;
  if(field==='udOpportunity'&&val===false)walkDraft.udResult=null;
  renderWalkHoleEntry();
}

function setWalkRepBucket(field,idx,bucket,prop){
  playSound('click');
  const propName=prop||'bucket';
  walkDraft[field][idx][propName]=bucket;
  // If primary approach changes off-green status, reset U&D answers
  if(field==='approachReps'&&walkDraft[field][idx].primary){
    if(bucket!=='off-green'){walkDraft.udOpportunity=null;walkDraft.udResult=null;}
    // If approach is now on green or better, clear any stale primary chip
    // (approach landed on green so no first-ball chip is logically possible).
    // Bonus chip reps stay — those are practice volume, not first-ball data.
    if(bucket==='in15'||bucket==='on-green'){
      walkDraft.chipReps=walkDraft.chipReps.filter(r=>!r.primary);
    }
  }
  renderWalkHoleEntry();
}

function addWalkRep(field,primary){
  playSound('click');
  // Singular primary constraint applies to approach and chip only.
  // Putts can have multiple primaries (a 3-putt = 3 primary putts in sequence).
  if(primary&&field!=='puttReps'&&walkDraft[field].some(r=>r.primary))return;
  const rep={primary,bucket:null};
  if(field==='puttReps'){rep.distBucket=null;rep.holed=false;delete rep.bucket;}
  walkDraft[field].push(rep);
  renderWalkHoleEntry();
}

function removeWalkRep(field,idx){
  playSound('click');
  walkDraft[field].splice(idx,1);
  renderWalkHoleEntry();
}

function toggleWalkRep(field,idx,prop){
  playSound('click');
  walkDraft[field][idx][prop]=!walkDraft[field][idx][prop];
  renderWalkHoleEntry();
}

function saveWalkHole(){
  const d=walkDraft;
  const isPar3=d.par===3;
  if(d.par===null||d.par===undefined){
    playSound('error');document.getElementById('hole-err').textContent='⚠ SET PAR';return;
  }
  if(!isPar3&&d.tee===null){
    playSound('error');document.getElementById('hole-err').textContent='⚠ LOG TEE SHOT';return;
  }
  const primApp=d.approachReps.find(r=>r.primary);
  if(!primApp||!primApp.bucket){
    playSound('error');document.getElementById('hole-err').textContent='⚠ LOG PRIMARY APPROACH (with bucket)';return;
  }
  if(primApp.bucket==='off-green'&&d.udOpportunity===null){
    playSound('error');document.getElementById('hole-err').textContent='⚠ LOG U&D OPPORTUNITY';return;
  }
  // U&D result requirement: needed only if udOpp=Y AND we can't auto-derive
  // (i.e., no primary chip logged). Manual override is still allowed alongside derive.
  if(d.udOpportunity===true){
    const primChip=d.chipReps.find(r=>r.primary);
    const canDerive=primChip&&primChip.bucket;
    if(!canDerive&&d.udResult===null){
      playSound('error');document.getElementById('hole-err').textContent='⚠ LOG U&D RESULT (or log chip & putts to auto-derive)';return;
    }
  }
  for(let i=0;i<d.approachReps.length;i++){
    if(!d.approachReps[i].bucket){
      playSound('error');document.getElementById('hole-err').textContent='⚠ APPROACH REP '+(i+1)+' MISSING BUCKET';return;
    }
  }
  for(let i=0;i<d.chipReps.length;i++){
    if(!d.chipReps[i].bucket){
      playSound('error');document.getElementById('hole-err').textContent='⚠ CHIP REP '+(i+1)+' MISSING BUCKET';return;
    }
  }
  for(let i=0;i<d.puttReps.length;i++){
    if(!d.puttReps[i].distBucket){
      playSound('error');document.getElementById('hole-err').textContent='⚠ PUTT REP '+(i+1)+' MISSING DISTANCE';return;
    }
  }
  const idx=activeWalk.holes.findIndex(h=>h.number===d.number);
  if(idx>=0)activeWalk.holes[idx]=d;
  else activeWalk.holes.push(d);
  activeWalk.holes.sort((a,b)=>a.number-b.number);
  saveActiveWalk();
  playSound('save');
  closeWalkHoleModal();
  showToast('HOLE '+d.number+' COMPLETE');
}

/* WALK SCORING */
function computeWalkScore(w){
  // TEE: % fairway+ on par-4/5 holes only (par 3s excluded)
  const teePar45=w.holes.filter(h=>h.par!==3&&h.tee);
  const teeAttempts=teePar45.length;
  const teeHits=teePar45.filter(h=>h.tee==='fairway').length;

  // APPROACH: weighted % across all reps.
  let appReps=0,appPoints=0;
  w.holes.forEach(h=>{
    (h.approachReps||[]).forEach(r=>{
      if(!r.bucket)return;
      appReps++;
      appPoints+=APPROACH_BUCKET_PCT[r.bucket]||0;
    });
  });
  const appPct=appReps?(appPoints/appReps):0;

  // CHIP: weighted % across all reps. Primary chip with 0 putts on hole = chip-in (120%).
  // Bonus chip reps always score by the standard table.
  let chipReps=0,chipPoints=0;
  w.holes.forEach(h=>{
    const primaryPuttCount=(h.puttReps||[]).filter(r=>r.primary).length;
    (h.chipReps||[]).forEach(r=>{
      if(!r.bucket)return;
      chipReps++;
      if(r.primary&&primaryPuttCount===0&&r.bucket!=='double'){
        // Chip-in: holed it from off the green. Big skill, big credit.
        chipPoints+=120;
      }else{
        chipPoints+=CHIP_BUCKET_PCT[r.bucket]||0;
      }
    });
  });
  const chipPct=chipReps?(chipPoints/chipReps):0;

  // PUTT: % holed of primary short putts (<10 ft)
  let puttDenom=0,puttHits=0;
  w.holes.forEach(h=>{
    (h.puttReps||[]).forEach(r=>{
      if(r.primary&&r.distBucket==='short'){
        puttDenom++;
        if(r.holed)puttHits++;
      }
    });
  });
  const puttPct=puttDenom?(puttHits/puttDenom*100):0;

  // U&D: % converted on missed greens. Result auto-derived from chip + putt combo when both
  // are logged (see deriveUdResult); falls back to manually-set h.udResult otherwise.
  let udDenom=0,udHits=0;
  w.holes.forEach(h=>{
    const primApp=(h.approachReps||[]).find(r=>r.primary);
    if(primApp&&primApp.bucket==='off-green'&&h.udOpportunity===true){
      udDenom++;
      const result=deriveUdResult(h);
      if(result==='converted'||result==='holed')udHits++;
    }
  });
  const udPct=udDenom?(udHits/udDenom*100):0;

  const teePct=teeAttempts?(teeHits/teeAttempts*100):0;

  const cats={
    tee:{numerator:teeHits,denominator:teeAttempts,minReps:WALK_MIN_REPS.tee,pct:teePct,unit:'par-4/5'},
    approach:{numerator:appPoints,denominator:appReps,minReps:WALK_MIN_REPS.approach,pct:appPct,unit:'reps'},
    chip:{numerator:chipPoints,denominator:chipReps,minReps:WALK_MIN_REPS.chip,pct:chipPct,unit:'reps'},
    ud:{numerator:udHits,denominator:udDenom,minReps:WALK_MIN_REPS.ud,pct:udPct,unit:'misses'},
    putt:{numerator:puttHits,denominator:puttDenom,minReps:WALK_MIN_REPS.putt,pct:puttPct,unit:'short putts'}
  };
  Object.keys(cats).forEach(k=>{
    cats[k].qualified=cats[k].denominator>=cats[k].minReps;
  });

  let weightSum=0,weightedPct=0;
  Object.keys(cats).forEach(k=>{
    if(cats[k].qualified){
      weightSum+=WALK_WEIGHTS[k];
      // Cap pct at 100 for composite math (chip 120% bonus shouldn't push composite above 100)
      const cappedPct=Math.min(100,cats[k].pct);
      weightedPct+=cappedPct*WALK_WEIGHTS[k];
    }
  });
  const composite=weightSum>0?weightedPct/weightSum:null;
  const score=composite!==null?Math.round(composite):0;
  return{categories:cats,composite,score};
}

/* Derive U&D result from chip + putt combo on a walk hole.
   Returns null if data is insufficient (no primary chip OR no putts logged). */
function deriveUdResult(h){
  const primChip=(h.chipReps||[]).find(r=>r.primary);
  if(!primChip||!primChip.bucket){
    // Fall back to manually-set value
    return h.udResult||null;
  }
  const primPuttCount=(h.puttReps||[]).filter(r=>r.primary).length;
  // Double chip = always failed regardless of putts
  if(primChip.bucket==='double')return 'failed';
  // 0 putts = chip-in (holed)
  if(primPuttCount===0)return 'holed';
  // 1 putt = converted (chip + 1-putt = up & down)
  if(primPuttCount===1)return 'converted';
  // 2+ putts = failed
  return 'failed';
}

function endWalk(){
  if(!activeWalk||!activeWalk.holes.length)return;
  const live=computeWalkScore(activeWalk);
  if(live.composite===null){
    pendingWalkLive=live;
    promptConfirm('⚠ NO QUALIFIED CATEGORIES','None of the categories met sample size thresholds. Save anyway with score 0?',()=>{
      finalizeWalk(false);
    });
    return;
  }
  // Show save-to-on-course prompt
  showWalkEndPrompt(live);
}

function showWalkEndPrompt(live){
  pendingWalkLive=live;
  document.getElementById('modal-body').innerHTML=`
    <div style="margin-bottom:18px">
      <div style="font-family:var(--font-px);font-size:9px;color:var(--green);margin-bottom:8px">▶ WALK COMPLETE</div>
      <div style="font-size:11px;color:var(--text-dim);line-height:1.6">${activeWalk.holes.length} hole${activeWalk.holes.length===1?'':'s'} logged · Composite ${live.composite.toFixed(1)}% · Score ${live.score}/100</div>
    </div>
    ${renderWalkCategorySummary(live)}
    <div class="walk-save-prompt" style="margin-top:18px">
      <div class="walk-save-ttl">💾 SAVE TO ON COURSE LOG?</div>
      <div class="walk-save-txt">First-ball stats can be saved as a CASUAL WALK in your On Course history. Bonus reps stay only in this practice game record.</div>
      <div class="walk-save-btns">
        <button class="btn btn-blue" onclick="finalizeWalk(true)">✓ SAVE AS CASUAL WALK</button>

function finalizeWalk(saveToOnCourse){
  const live=pendingWalkLive||computeWalkScore(activeWalk);
  pendingWalkLive=null;
  const w=activeWalk;
  w.endedAt=new Date().toISOString();
  // Save to practice sessions as gameId 'walk'
  state.practiceSessions.unshift({
    id:uuid(),
    gameId:'walk',
    score:live.score,
    date:w.endedAt,
    notes:'',
    subStats:{},
    walkData:{
      holesPlayed:w.holes.length,
      composite:live.composite,
      categories:live.categories,
      savedToOnCourse:saveToOnCourse,
      holes:w.holes
    }
  });
  savePractice();

  if(saveToOnCourse){
    // Build a casual_walk round from primary first-ball stats
    const round={
      id:uuid(),
      sessionType:'casual_walk',
      course:'',
      targetHoles:w.holes.length,
      startedAt:w.startedAt,
      endedAt:w.endedAt,
      sourceWalkId:w.id,
      schemaVersion:SCHEMA_VERSION,
      holes:w.holes.map(h=>{
        const primApp=(h.approachReps||[]).find(r=>r.primary);
        const approach=primApp?primApp.bucket:null;
        const puttCount=(h.puttReps||[]).filter(r=>r.primary).length;
        const primPutts=(h.puttReps||[]).filter(r=>r.primary);
        let firstPuttDist=null;
        if(primPutts.length){
          if(primPutts.some(p=>p.distBucket==='long'))firstPuttDist='long';
          else if(primPutts.some(p=>p.distBucket==='mid'))firstPuttDist='mid';
          else if(primPutts.some(p=>p.distBucket==='short'))firstPuttDist='short';
        }
        const gir=(approach==='in15'||approach==='on-green');
        // Effective U&D result: manual override if set, otherwise derived
        const effectiveUd=h.udResult||deriveUdResult(h);
        return{
          number:h.number,
          par:h.par||4,
          score:h.score,
          tee:h.par===3?null:h.tee,
          penalties:h.penalties||0,
          approach:approach,
          gir:gir,
          udOpportunity:h.udOpportunity,
          udResult:effectiveUd,
          putts:puttCount,
          firstPuttDist:firstPuttDist
        };
      })
    };
    state.rounds.unshift(round);
    saveRounds();
  }

  activeWalk=null;saveActiveWalk();
  closeWalkModal();
  playSound('save');
  showToast('WALK SAVED — '+live.score+'/100 ('+(live.composite?live.composite.toFixed(1):'0')+'%)');
  renderContent();
}
